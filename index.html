<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="./pages/index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Место</title>
    <meta name="author" content="Даниил Ушаков">
</head>

<body class="root"><!--ЗДЕСЬ НАЧИНАЕТСЯ СТРАНИЦА-->
    <!--EDIT FORM-->
    <section class="modal-window modal-window_place_edit-form">
        <div class="form-container">
            <button type="button" class="form__close-button">+</button>
            <form action="#" name='edit-form' class="form" novalidate>
                <h3 class="form__title">Редактировать профиль</h3>
                <input id="name" type="text" name="name" placeholder="Как вас зовут" class="form__input form__input_type_name"
                    required minlength="2" maxlength="40">
                <span id="error-name" name="error-name" class="form__span error-massage"></span>
                <input id="bio" type="text" name="bio" placeholder="Расскажите о себе" class="form__input form__input_type_bio"
                    required minlength="2" maxlength="200">
                <span id="error-bio" name="error-bio" class="form__span error-massage"></span>
                <button type='submit' class="form__save-button form__save-button_disabled">Сохранить</button>
            </form>
        </div>
    </section>

    <section class="modal-window modal-window_place_add-form">
        <div class="form-container">
            <button type="button" class="form__close-button">+</button>
            <form action="#" name='add-place-form' class="form" novalidate>
                <h3 class="form__title form__title_text_left">Новое место</h3>
                <input id="info" type="text" name="info" placeholder="О посте" class="form__input form__input_type_place"
                    required>
                <span id="error-info" name="error-info" class="form__span error-massage"></span>
                <input id="image" type="url" name="image" placeholder="ссылка на изображение"
                    class="form__input form__input_type_image-url" required>
                <span id="error-image" name="error-image" class="form__span error-massage"></span>
                <button type='submit' class="form__save-button">Создать</button>
            </form>
        </div>
    </section>

    <section class="modal-window modal-window_place_image">
        <div class="image-popup">
            <button type="button" class="form__close-button form__close-button_place_image-popup">+</button>
            <figure class="image-popup__figure">
                <img src="./images/гора эльбрус.png" class="image-popup__image" alt="place">
                <figcaption class="image-popup__text">гора</figcaption>
            </figure>
        </div>
    </section>

    <div class="page">
        <header class="header"> <!--HEADER-->
            <img src="./images/logo.svg" class="header__logo">
        </header>
        <main class="content"><!--ЗДЕСЬ НАЧИНАЕТСЯ КОНТЕНТ-->

            <section class="profile"><!--PROFILE-->
                <div class="profile__bio">

                    <img src='./images/avatar.jpg' class="profile__avatar">

                    <div class="profile__info">
                        <div class="profile__name_container">
                            <h1 class="profile__title">Жак-Ив Кусто</h1>
                            <button type="button" class="profile__edit-button"></button>
                        </div>
                        <p class='profile__text'>Исследователь океана</p>
                    </div>
                </div>

                <button type="button" class="profile__add-button">+</button>

            </section>

            <section class="elements"><!--ELEMTNTS-->

            </section>

        </main>
        <footer class="footer"><!--FOOTER-->
            <p class="footer__info">© 2022 Mesto Russia</p>
        </footer>
    </div>
    <template id="post-template">
        <div class="element">
            <img src="#" class="element__image">
            <button type="button" class="element__delete-place"></button>
            <div class="element__info">
                <h2 class="element__place"></h2>
                <button type="button" class="element__like"></button>
            </div>
        </div>
    </template>
    <script type="module" src="./script.js"></script>
</body>

</html>
