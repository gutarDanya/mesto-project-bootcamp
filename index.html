<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="./pages/index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Место</title>
    <meta name="author" content="Даниил Ушаков">
</head>

<body class="root"><!--ЗДЕСЬ НАЧИНАЕТСЯ СТРАНИЦА-->
    <!--EDIT FORM-->
    <section class="edit-form">
        <div class="form-container">
            <button type="button" class="form__close-button">+</button>
            <form name='edit-form' class="form">
                <h3 class="form__title">Редактировать профиль</h3>
                <input type="text" name="name" placeholder="Жак-Ив Кусто" class="form__input form__input_type_name">
                <input type="text" name="bio" placeholder="Исследователь океана"
                    class="form__input form__input_type_bio">
                <button type='submit' class="form__save-button">Сохранить</button>
            </form>
        </div>
    </section>
    <div class="page">
        <header class="header"> <!--HEADER-->
            <img src="./images/logo.svg" class="header__logo">
        </header>
        <main class="content"><!--ЗДЕСЬ НАЧИНАЕТСЯ КОНТЕНТ-->

            <section class="profile"><!--PROFILE-->
                <div class="profile__bio">

                    <img src='./images/avatar.jpg' class="profile__avatar">

                    <div class="profile__info">
                        <h1 class="profile__title">Жак-Ив Кусто
                            <button type="button" class="profile__edit-button"></button>
                        </h1>
                        <p class=profile__text>Исследователь океана</p>
                    </div>
                </div>

                <button type="button" class="profile__add-button">+</button>

            </section>

            <section class="elements"><!--ELEMTNTS-->

                <div class="element">
                    <img src='./images/новороссийск.jpg' alt="новороссийск" class="element__image">
                    <div class="element__info">
                        <h2 class="element__place">Новороссийск</h2>
                        <button type="button" class="element__like"></button>
                    </div>
                </div>

                <div class="element">
                    <img src='./images/гора эльбрус далеко.png' alt="гора эльбрус" class="element__image">
                    <div class="element__info">
                        <h2 class="element__place">Гора Эльбрус</h2>
                        <button type="button" class="element__like"></button>
                    </div>
                </div>

                <div class="element">
                    <img src='./images/Домбай.png' alt="Домбай" class="element__image">
                    <div class="element__info">
                        <h2 class="element__place">Домбай</h2>
                        <button type="button" class="element__like"></button>
                    </div>
                </div>

                <div class="element">
                    <img src='./images/гора эльбрус далеко.png' alt="Гора Эльбрус" class="element__image">
                    <div class="element__info">
                        <h2 class="element__place">Гора Эльбрус</h2>
                        <button type="button" class="element__like"></button>
                    </div>
                </div>

                <div class="element">
                    <img src='./images/Домбай.png' alt="Домбай" class="element__image">
                    <div class="element__info">
                        <h2 class="element__place">Домбай</h2>
                        <button type="button" class="element__like"></button>
                    </div>
                </div>

                <div class="element">
                    <img src='./images/карачаевск.jpg' alt="Карасаево-Черкаск" class="element__image">
                    <div class="element__info">
                        <h2 class="element__place">Карасаево-Черкаск</h2>
                        <button type="button" class="element__like"></button>
                    </div>
                </div>
            </section>

        </main>
        <footer class="footer"><!--FOOTER-->
            <p class="footer__info">© 2022 Mesto Russia</p>
        </footer>
    </div>
    <script src="./script.js"></script>
</body>

</html>
